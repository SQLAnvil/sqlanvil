syntax = "proto3";

package sqlanvil;

import "core.proto";
import "db_adapter.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/sqlanvil/sqlanvil/protos/sqlanvil";

message RunConfig {
  repeated string actions = 1;
  repeated string tags = 5;
  bool include_dependencies = 3;
  bool include_dependents = 11;
  bool full_refresh = 2;
  int32 timeout_millis = 7;

  // For internal use only, will be removed at a later date.
  bool disable_set_metadata = 9;

  // This setting no longer has any effect.
  bool use_run_cache = 8;

  reserved 4, 6;
}

message ExecutionTask {
  string type = 1;
  string statement = 2;
}

// Carried on an ExecutionAction of type "export" so the runner-side DuckDB
// exporter (Postgres/Supabase) has the destination + format. The query is also
// carried on the action's export task statement.
message ExportSpec {
  string query = 1;
  string location = 2;
  string format = 3;
  bool overwrite = 4;
  string filename = 5;
  map<string, string> options = 6;
}

// Carried on an ExecutionAction of type "import" so the runner-side DuckDB importer
// (Postgres/Supabase) has the source + format + destination semantics. The destination table is
// the ExecutionAction's own target.
message ImportSpec {
  string location = 1;
  string format = 2;
  bool overwrite = 3;
  map<string, string> options = 4;
}

// Carried on an ExecutionAction of type "extract" so the runner-side extractor reads the
// cross-warehouse source (keyless BigQuery, MySQL/MariaDB) and materializes the rows into the
// ExecutionAction's own target. Auth for the connection rides in .df-credentials.json's
// `connections` map.
message ExtractSpec {
  string connection_name = 1;
  string platform = 2;
  string project = 3;
  string dataset = 4;
  string source_name = 5;
  string billing_project = 6;
  map<string, string> column_types = 7;
  // Source database for platforms whose namespace is a database (MySQL).
  string database = 8;
}

// Carried on an ExecutionAction of type "script" so the run-time script runner (a CLI-side
// spawn, not a warehouse statement) has the language, file, and environment contract. No
// warehouse credentials are ever injected into a script's process.
message ScriptSpec {
  string language = 1;
  // Script path relative to the project root.
  string filename = 2;
  repeated string args = 3;
  // Dependency manifest relative to the project root (requirements.txt for python).
  string deps_file = 4;
  // Runtime version specifier (PEP 440 for python).
  string runtime_version = 5;
  // Environment root relative to the project root (a venv for python).
  string env_root = 6;
  // Per-action timeout in milliseconds. 0 = the default (30 minutes).
  int32 timeout_millis = 7;
}

message ExecutionAction {
  Target target = 5;
  string file_name = 8;

  string type = 4;
  string table_type = 6;

  repeated Target dependency_targets = 11;
  ActionHermeticity hermeticity = 10;

  repeated ExecutionTask tasks = 2;

  ActionDescriptor action_descriptor = 9;

  string jit_code = 12;

  ExportSpec export = 13;
  ImportSpec import = 14;
  ExtractSpec extract = 15;
  ScriptSpec script = 16;

  reserved 1, 3, 7;
}

message WarehouseState {
  repeated TableMetadata tables = 1;

  reserved 2;
}

message ExecutionGraph {
  ProjectConfig project_config = 1;
  RunConfig run_config = 2;
  WarehouseState warehouse_state = 4;
  repeated Target declaration_targets = 5;

  repeated ExecutionAction actions = 3;
  google.protobuf.Struct jit_data = 7;
}

message Timing {
  int64 start_time_millis = 1;
  int64 end_time_millis = 2;
}

message RunResult {
  enum ExecutionStatus {
    UNKNOWN = 0;
    RUNNING = 1;
    SUCCESSFUL = 2;
    FAILED = 3;
    CANCELLED = 4;
    TIMED_OUT = 5;
  }
  ExecutionStatus status = 1;
  repeated ActionResult actions = 2;
  Timing timing = 3;
}

message ActionResult {
  Target target = 5;

  enum ExecutionStatus {
    UNKNOWN = 0;
    RUNNING = 1;
    SUCCESSFUL = 2;
    FAILED = 3;
    SKIPPED = 4;
    DISABLED = 5;
    CANCELLED = 6;
    reserved 7;
  }
  ExecutionStatus status = 2;

  repeated TaskResult tasks = 3;
  Timing timing = 4;

  reserved 1, 6, 7;
}

message TaskResult {
  enum ExecutionStatus {
    UNKNOWN = 0;
    RUNNING = 1;
    SUCCESSFUL = 2;
    FAILED = 3;
    SKIPPED = 4;
    CANCELLED = 5;
  }
  ExecutionStatus status = 1;
  string error_message = 2;
  Timing timing = 3;
  ExecutionMetadata metadata = 4;
}

message TestResult {
  string name = 1;
  bool successful = 2;
  repeated string messages = 3;
}
